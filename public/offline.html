<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050506" />
    <title>37 Music Studio Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050506;
        color: #fff7ef;
      }

      body {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background:
          radial-gradient(circle at 22% 14%, rgba(255, 138, 42, 0.24), transparent 34%),
          radial-gradient(circle at 80% 86%, rgba(255, 95, 21, 0.18), transparent 32%),
          #050506;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(16, 16, 18, 0.82);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
        padding: 26px;
      }

      span {
        display: inline-grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 18px;
        background: linear-gradient(135deg, #ff8a2a, #ff681f);
        color: #17100a;
        font-weight: 900;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(1.8rem, 8vw, 2.55rem);
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        color: rgba(255, 247, 239, 0.7);
        line-height: 1.55;
      }

      button {
        width: 100%;
        min-height: 46px;
        margin-top: 22px;
        border: 0;
        border-radius: 16px;
        background: #ff8a2a;
        color: #17100a;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <span>37</span>
      <h1>Mode offline</h1>
      <p>Koneksi sedang putus. Beberapa data booking, billing, dan chat membutuhkan internet untuk sinkron ulang.</p>
      <button type="button" onclick="window.location.reload()">Coba lagi</button>
    </main>
  </body>
</html>
